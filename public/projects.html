<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Team Task Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard.html">Team Task Manager</a>
    <nav>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/projects.html">Projects</a>
      <a href="/tasks.html">Tasks</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="page-heading">
      <h1>Projects</h1>
      <p>Admins can create projects and add team members.</p>
    </section>

    <form class="panel admin-only" id="projectForm">
      <h2>Create project</h2>
      <label>Project name
        <input type="text" id="projectName" required>
      </label>
      <label>Description
        <textarea id="projectDescription" rows="3"></textarea>
      </label>
      <button class="button" type="submit">Create project</button>
    </form>

    <section class="list" id="projectList"></section>
    <p class="message" id="message"></p>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/projects.js"></script>
</body>
</html>
